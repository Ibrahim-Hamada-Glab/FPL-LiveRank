services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fpllive
      POSTGRES_USER: fpllive
      POSTGRES_PASSWORD: fpllive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpllive -d fpllive"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/FplLiveRank.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=fpllive;Username=fpllive;Password=fpllive"
      Redis__ConnectionString: "redis:6379"
      Redis__Enabled: "true"
      Cors__AllowedOrigins__0: "http://localhost:8081"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:8081"

volumes:
  postgres_data:

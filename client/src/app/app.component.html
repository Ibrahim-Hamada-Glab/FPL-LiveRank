<div class="min-h-screen bg-app text-slate-100">
  <header class="border-b border-white/10 bg-slate-950/70 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">
      <a routerLink="/" class="flex items-center gap-3">
        <span class="grid h-9 w-9 place-items-center rounded-md bg-accent text-sm font-black text-pitch">FPL</span>
        <span>
          <span class="block text-sm font-semibold leading-4">Live Rank</span>
          <span class="text-xs text-slate-400">Public FPL data, local calculations</span>
        </span>
      </a>
      <nav class="flex items-center gap-2 text-sm">
        <a
          routerLink="/"
          routerLinkActive="bg-white/10 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-2 text-slate-300 transition hover:bg-white/10 hover:text-white">
          Manager
        </a>
        <a
          routerLink="/league/1"
          routerLinkActive="bg-white/10 text-white"
          class="rounded-md px-3 py-2 text-slate-300 transition hover:bg-white/10 hover:text-white">
          League
        </a>
      </nav>
    </div>
  </header>

  <router-outlet></router-outlet>
</div>
